# .github/workflows/api-review-reusable.yml
# 
# CAMARA API Review - Reusable Workflow (Dynamic Discovery)
# 
# Purpose: Performs automated validation of CAMARA API definitions against compliance checklist.
#   - Validates commonalities version support
#   - Uses version-specific validator scripts from tooling repository
#   - Currently supports Commonalities 0.6 only
#   - Checks out target repository PR branch
#   - Finds API YAML files in /code/API_definitions/  
#   - Runs comprehensive automated validation checks
#   - Generates detailed reports with unique filenames
#   - Generates issue summaries with up to 25 items
# 
# Called by: api-review-trigger.yml workflow (can be in different repositories)
# 
# Deploy this file to: camaraproject/tooling/.github/workflows/ directory
# Or to: {your-org}/tooling/.github/workflows/ directory for testing

name: 'CAMARA API Review - Reusable'

on:
  workflow_call:
    inputs:
      repo_owner:
        required: true
        type: string
      repo_name:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      pr_head_sha:
        required: true
        type: string
      pr_head_ref:
        required: true
        type: string
      pr_head_repo:
        required: true
        type: string
      pr_base_ref:
        required: true
        type: string
      pr_base_repo:
        required: true
        type: string
      review_type:
        required: true
        type: string
      commonalities_version:
        required: true
        type: string
      issue_number:
        required: false
        type: string
      pr_number_for_comment:
        required: false
        type: string
      result_target:
        required: true
        type: string
    outputs:
      summary_content:
        description: "The review summary content for posting to issues"
        value: ${{ jobs.provide-outputs.outputs.summary_content }}
      review_status:
        description: "Overall review status (success, has_critical_issues, error)"
        value: ${{ jobs.provide-outputs.outputs.review_status }}
      critical_issues_count:
        description: "Number of critical issues found"
        value: ${{ jobs.provide-outputs.outputs.critical_issues_count }}

jobs:
  validate-commonalities-version:
    runs-on: ubuntu-latest
    outputs:
      validator_script: ${{ steps.determine-validator.outputs.validator_script }}
      version_supported: ${{ steps.determine-validator.outputs.version_supported }}
      error_message: ${{ steps.determine-validator.outputs.error_message }}
    steps:
      - name: Validate Commonalities Version Support
        id: determine-validator
        run: |
          COMMONALITIES_VERSION="${{ inputs.commonalities_version }}"
          echo "🔍 Validating Commonalities version: $COMMONALITIES_VERSION"
          
          # Map version to validator script
          case "$COMMONALITIES_VERSION" in
            "0.6")
              echo "✅ Commonalities 0.6 is supported"
              echo "validator_script=api_review_validator_v0_6.py" >> $GITHUB_OUTPUT
              echo "version_supported=true" >> $GITHUB_OUTPUT
              ;;
            "0.7")
              echo "⏳ Commonalities 0.7 is planned but not yet supported"
              echo "validator_script=api_review_validator_v0_7.py" >> $GITHUB_OUTPUT
              echo "version_supported=false" >> $GITHUB_OUTPUT
              echo "error_message=Commonalities version 0.7 is not yet supported. Currently supported: 0.6" >> $GITHUB_OUTPUT
              ;;
            "1.0")
              echo "⏳ Commonalities 1.0 is planned but not yet supported"
              echo "validator_script=api_review_validator_v1_0.py" >> $GITHUB_OUTPUT
              echo "version_supported=false" >> $GITHUB_OUTPUT
              echo "error_message=Commonalities version 1.0 is not yet supported. Currently supported: 0.6" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "❌ Unsupported Commonalities version: $COMMONALITIES_VERSION"
              echo "validator_script=" >> $GITHUB_OUTPUT
              echo "version_supported=false" >> $GITHUB_OUTPUT
              echo "error_message=Unsupported Commonalities version: $COMMONALITIES_VERSION. Currently supported: 0.6" >> $GITHUB_OUTPUT
              ;;
          esac

  api-review:
    runs-on: ubuntu-latest
    needs: validate-commonalities-version
    if: needs.validate-commonalities-version.outputs.version_supported == 'true'
    outputs:
      validation_exit_code: ${{ steps.review.outputs.validation_exit_code }}
      summary_content: ${{ steps.create-summary.outputs.summary_content }}
      review_status: ${{ steps.create-summary.outputs.review_status }}
      critical_issues_count: ${{ steps.create-summary.outputs.critical_issues_count }}
      report_filename: ${{ steps.find-report.outputs.report_filename }}
    steps:
      - name: Display Configuration
        run: |
          echo "🎯 API Review Configuration:"
          echo "Repository: ${{ inputs.repo_owner }}/${{ inputs.repo_name }}"
          echo "PR: #${{ inputs.pr_number }}"
          echo "Head SHA: ${{ inputs.pr_head_sha }}"
          echo "Head Ref: ${{ inputs.pr_head_ref }}"
          echo "Head Repo: ${{ inputs.pr_head_repo }}"
          echo "Base Ref: ${{ inputs.pr_base_ref }}"
          echo "Base Repo: ${{ inputs.pr_base_repo }}"
          echo "Review Type: ${{ inputs.review_type }}"
          echo "Commonalities Version: ${{ inputs.commonalities_version }}"
          echo "Validator Script: ${{ needs.validate-commonalities-version.outputs.validator_script }}"
          echo "Tooling Repository: ${{ github.repository }}"
          echo "Result Target: ${{ inputs.result_target }}"
          
          if [[ "${{ inputs.result_target }}" == "issue" ]]; then
            echo "Target Issue: #${{ inputs.issue_number }}"
          elif [[ "${{ inputs.result_target }}" == "pull_request" ]]; then
            echo "Target PR: #${{ inputs.pr_number_for_comment }}"
          fi

      - name: Checkout Tooling Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: tooling-repo

      - name: Checkout Target Repository PR
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.pr_head_repo }}
          ref: ${{ inputs.pr_head_sha }}
          path: target-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Checkout
        run: |
          echo "🔍 Verifying repository checkouts..."
          
          echo "📁 Tooling Repository:"
          echo "  Path: tooling-repo"
          echo "  Repository: ${{ github.repository }}"
          echo "  Contents: $(ls -la tooling-repo/)"
          
          echo ""
          echo "📁 Target Repository:"
          echo "  Path: target-repo"
          echo "  Repository: ${{ inputs.pr_head_repo }}"
          echo "  Expected SHA: ${{ inputs.pr_head_sha }}"
          echo "  Expected Branch: ${{ inputs.pr_head_ref }}"
          
          cd target-repo
          
          # Get current commit info
          CURRENT_SHA=$(git rev-parse HEAD)
          CURRENT_BRANCH=$(git branch --show-current 2>/dev/null || echo "detached")
          
          echo "  Current SHA: $CURRENT_SHA"
          echo "  Current Branch: $CURRENT_BRANCH"
          echo "  Working Directory: $(pwd)"
          
          # Verify we have the right commit
          if [[ "$CURRENT_SHA" == "${{ inputs.pr_head_sha }}" ]]; then
            echo "✅ Successfully checked out PR commit: ${{ inputs.pr_head_sha }}"
          else
            echo "❌ SHA mismatch!"
            echo "  Expected: ${{ inputs.pr_head_sha }}"
            echo "  Actual: $CURRENT_SHA"
            exit 1
          fi

      - name: Locate Version-Specific API Validator Script
        id: locate-validator
        run: |
          VALIDATOR_SCRIPT="${{ needs.validate-commonalities-version.outputs.validator_script }}"
          SCRIPT_PATH="tooling-repo/scripts/$VALIDATOR_SCRIPT"
          
          echo "🔍 Looking for validator script: $SCRIPT_PATH"
          
          if [ -f "$SCRIPT_PATH" ]; then
            echo "✅ Found validator script: $SCRIPT_PATH"
            echo "script_path=$SCRIPT_PATH" >> $GITHUB_OUTPUT
            echo "script_found=true" >> $GITHUB_OUTPUT
            
            # Check if script is executable and has reasonable size
            SCRIPT_SIZE=$(stat -f%z "$SCRIPT_PATH" 2>/dev/null || stat -c%s "$SCRIPT_PATH" 2>/dev/null || echo "0")
            echo "  Script size: $SCRIPT_SIZE bytes"
            
            if [ "$SCRIPT_SIZE" -lt 1000 ]; then
              echo "⚠️ Warning: Script seems very small ($SCRIPT_SIZE bytes)"
            fi
          else
            echo "❌ ERROR: Validator script not found: $SCRIPT_PATH"
            echo "script_found=false" >> $GITHUB_OUTPUT
            
            echo ""
            echo "Available files in tooling-repo/scripts/:"
            ls -la tooling-repo/scripts/ || echo "scripts/ directory not found"
            
            echo ""
            echo "This error indicates that the required validator script is missing from the tooling repository."
            echo "Expected location: scripts/$VALIDATOR_SCRIPT"
            echo "Tooling repository: ${{ github.repository }}"
            
            exit 1
          fi

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          echo "📦 Installing Python dependencies..."
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema openapi-spec-validator requests
          
          echo "✅ Dependencies installed:"
          pip list | grep -E "(pyyaml|jsonschema|openapi-spec-validator|requests)"

      - name: Run API Review Validation
        id: review
        run: |
          echo "🚀 Starting API review validation..."
          
          # Set up paths
          TARGET_DIR="$(pwd)/target-repo"
          OUTPUT_DIR="$(pwd)/review-output"
          VALIDATOR_SCRIPT="$(pwd)/${{ steps.locate-validator.outputs.script_path }}"
          
          echo "📁 Paths:"
          echo "  Target Directory: $TARGET_DIR"
          echo "  Output Directory: $OUTPUT_DIR"
          echo "  Validator Script: $VALIDATOR_SCRIPT"
          
          # Create output directory
          mkdir -p "$OUTPUT_DIR"
          
          # Run validation
          echo "🔍 Running validation..."
          set +e  # Don't exit on error, we want to capture the exit code
          
          python "$VALIDATOR_SCRIPT" "$TARGET_DIR" \
            --output "$OUTPUT_DIR" \
            --repo-name "${{ inputs.repo_name }}" \
            --pr-number "${{ inputs.pr_number }}" \
            --commonalities-version "${{ inputs.commonalities_version }}" \
            --review-type "${{ inputs.review_type }}"
          
          VALIDATION_EXIT_CODE=$?
          set -e  # Re-enable exit on error
          
          echo "validation_exit_code=$VALIDATION_EXIT_CODE" >> $GITHUB_OUTPUT
          
          echo "📋 Validation completed with exit code: $VALIDATION_EXIT_CODE"
          
          # List output files
          echo "📄 Generated files:"
          ls -la "$OUTPUT_DIR" || echo "No output files generated"
          
          if [ $VALIDATION_EXIT_CODE -eq 0 ]; then
            echo "✅ Validation completed successfully"
          else
            echo "❌ Validation found issues (exit code: $VALIDATION_EXIT_CODE)"
          fi

      - name: Find Generated Report
        id: find-report
        run: |
          OUTPUT_DIR="$(pwd)/review-output"
          
          echo "🔍 Looking for generated report files..."
          
          # Look for the main report file
          REPORT_FILE=$(find "$OUTPUT_DIR" -name "*api_review_report*.md" -o -name "*report*.md" | head -1)
          
          if [ -n "$REPORT_FILE" ]; then
            REPORT_FILENAME=$(basename "$REPORT_FILE")
            echo "✅ Found report: $REPORT_FILENAME"
            echo "report_path=$REPORT_FILE" >> $GITHUB_OUTPUT
            echo "report_filename=$REPORT_FILENAME" >> $GITHUB_OUTPUT
            
            # Show first few lines of report
            echo "📄 Report preview:"
            head -20 "$REPORT_FILE" || echo "Could not preview report"
          else
            echo "❌ No report file found in output directory"
            echo "Available files:"
            ls -la "$OUTPUT_DIR" || echo "Output directory is empty"
            echo "report_path=" >> $GITHUB_OUTPUT
            echo "report_filename=" >> $GITHUB_OUTPUT
          fi

      - name: Create Summary for Issue Comment
        id: create-summary
        run: |
          OUTPUT_DIR="$(pwd)/review-output"
          
          echo "📊 Creating summary for issue comment..."
          
          # Look for summary file first
          SUMMARY_FILE=$(find "$OUTPUT_DIR" -name "summary.md" | head -1)
          
          if [ -f "$SUMMARY_FILE" ]; then
            echo "✅ Found summary file: $SUMMARY_FILE"
            SUMMARY_CONTENT=$(cat "$SUMMARY_FILE")
          else
            echo "⚠️ No summary.md found, creating basic summary"
            
            EXIT_CODE="${{ steps.review.outputs.validation_exit_code }}"
            
            if [ "$EXIT_CODE" = "0" ]; then
              SUMMARY_CONTENT="✅ **Validation Passed**

No critical issues found. The API definitions comply with CAMARA guidelines.

**Status**: Ready for release
**Exit Code**: $EXIT_CODE"
              REVIEW_STATUS="success"
              CRITICAL_ISSUES_COUNT="0"
            else
              SUMMARY_CONTENT="❌ **Validation Failed**

Critical issues found that must be addressed before release.

**Status**: Requires fixes
**Exit Code**: $EXIT_CODE

Please download the detailed report for specific issues and recommendations."
              REVIEW_STATUS="has_critical_issues"
              CRITICAL_ISSUES_COUNT="unknown"
            fi
          fi
          
          # Try to extract status information if available
          if [ -f "$SUMMARY_FILE" ]; then
            if grep -q "No critical issues" "$SUMMARY_FILE"; then
              REVIEW_STATUS="success"
              CRITICAL_ISSUES_COUNT="0"
            elif grep -q "critical issue" "$SUMMARY_FILE"; then
              REVIEW_STATUS="has_critical_issues"
              CRITICAL_ISSUES_COUNT=$(grep -o "critical issue" "$SUMMARY_FILE" | wc -l)
            else
              REVIEW_STATUS="has_warnings"
              CRITICAL_ISSUES_COUNT="0"
            fi
          fi
          
          # Set outputs
          {
            echo 'summary_content<<SUMMARY_EOF_MARKER'
            echo "$SUMMARY_CONTENT"
            echo 'SUMMARY_EOF_MARKER'
          } >> $GITHUB_OUTPUT
          
          echo "review_status=${REVIEW_STATUS:-unknown}" >> $GITHUB_OUTPUT
          echo "critical_issues_count=${CRITICAL_ISSUES_COUNT:-0}" >> $GITHUB_OUTPUT
          
          echo "📋 Summary created:"
          echo "  Status: ${REVIEW_STATUS:-unknown}"
          echo "  Critical Issues: ${CRITICAL_ISSUES_COUNT:-0}"
          echo "  Length: $(echo "$SUMMARY_CONTENT" | wc -c) characters"

      - name: Upload Detailed Report
        uses: actions/upload-artifact@v4
        if: always() && steps.find-report.outputs.report_path != ''
        with:
          name: ${{ steps.find-report.outputs.report_filename }}
          path: ${{ steps.find-report.outputs.report_path }}
          retention-days: 30

      - name: Upload Summary for Comment
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-review-summary-${{ inputs.repo_name }}-pr${{ inputs.pr_number }}-${{ inputs.commonalities_version }}
          path: ./review-output/summary.md
          retention-days: 7

      - name: Display Review Summary
        if: always()
        run: |
          echo "## 📋 API Review Summary"
          echo "**Repository**: ${{ inputs.repo_name }}"
          echo "**PR**: #${{ inputs.pr_number }}"
          echo "**Commonalities Version**: ${{ inputs.commonalities_version }}"
          echo "**Validator Used**: ${{ needs.validate-commonalities-version.outputs.validator_script }}"
          echo "**Report File**: ${{ steps.find-report.outputs.report_filename }}"
          echo "**Tooling Repository**: ${{ github.repository }}"
          echo ""
          if [ -f "./review-output/summary.md" ]; then
            cat ./review-output/summary.md
          else
            echo "❌ Summary file not generated"
            echo "This usually indicates an error in the validation script"
          fi

      - name: Fail on Critical Issues
        if: always() && steps.review.outputs.validation_exit_code != '0'
        run: |
          EXIT_CODE="${{ steps.review.outputs.validation_exit_code }}"
          echo "🎯 API Review Results:"
          echo "   Commonalities Version: ${{ inputs.commonalities_version }}"
          echo "   Validator Used: ${{ needs.validate-commonalities-version.outputs.validator_script }}"
          echo "   Exit Code: $EXIT_CODE"
          echo "   Tooling Repository: ${{ github.repository }}"
          
          if [ "$EXIT_CODE" = "0" ]; then
            echo "✅ No critical issues found - ready for release!"
          else
            echo "❌ Critical issues found that must be addressed before release"
            echo "📄 Please download the detailed report and review all findings"
            echo "🔄 After fixing issues, re-run the review workflow"
            echo ""
            echo "This workflow failure is intentional to prevent release with critical issues."
            exit 1
          fi

  handle-version-error:
    runs-on: ubuntu-latest
    needs: validate-commonalities-version
    if: needs.validate-commonalities-version.outputs.version_supported != 'true'
    outputs:
      summary_content: ${{ steps.error-summary.outputs.summary_content }}
      review_status: ${{ steps.error-summary.outputs.review_status }}
      critical_issues_count: ${{ steps.error-summary.outputs.critical_issues_count }}
    steps:
      - name: Create Version Error Summary
        id: error-summary
        run: |
          ERROR_MSG="${{ needs.validate-commonalities-version.outputs.error_message }}"
          
          ERROR_SUMMARY="❌ **Version Not Supported**

$ERROR_MSG

**Supported Versions:**
- ✅ Commonalities 0.6: Fully supported
- ⏳ Commonalities 0.7: Planned for future release
- ⏳ Commonalities 1.0: Planned for future release

**Resolution:**
- Use Commonalities version 0.6 for current validation
- Check for updates to support newer versions
- Contact the CAMARA team for version roadmap

**Tooling Repository**: ${{ github.repository }}"
          
          {
            echo 'summary_content<<SUMMARY_EOF_MARKER'
            echo "$ERROR_SUMMARY"
            echo 'SUMMARY_EOF_MARKER'
          } >> $GITHUB_OUTPUT
          
          echo "review_status=error" >> $GITHUB_OUTPUT
          echo "critical_issues_count=0" >> $GITHUB_OUTPUT
          
          echo "⚠️ Version error summary created"

  provide-outputs:
    runs-on: ubuntu-latest
    needs: [api-review, handle-version-error]
    if: always()
    outputs:
      summary_content: ${{ steps.determine-outputs.outputs.summary_content }}
      review_status: ${{ steps.determine-outputs.outputs.review_status }}
      critical_issues_count: ${{ steps.determine-outputs.outputs.critical_issues_count }}
    steps:
      - name: Determine Final Outputs
        id: determine-outputs
        run: |
          echo "🎯 Determining final outputs..."
          
          if [[ "${{ needs.api-review.result }}" == "success" ]]; then
            echo "✅ Using outputs from successful API review"
            SUMMARY_CONTENT="${{ needs.api-review.outputs.summary_content }}"
            REVIEW_STATUS="${{ needs.api-review.outputs.review_status }}"
            CRITICAL_ISSUES_COUNT="${{ needs.api-review.outputs.critical_issues_count }}"
          elif [[ "${{ needs.handle-version-error.result }}" == "success" ]]; then
            echo "⚠️ Using outputs from version error handler"
            SUMMARY_CONTENT="${{ needs.handle-version-error.outputs.summary_content }}"
            REVIEW_STATUS="${{ needs.handle-version-error.outputs.review_status }}"
            CRITICAL_ISSUES_COUNT="${{ needs.handle-version-error.outputs.critical_issues_count }}"
          else
            echo "❌ No valid outputs available, creating error summary"
            SUMMARY_CONTENT="❌ **Workflow Error**

The API review workflow encountered an unexpected error and could not complete.

**Status**: Error
**Issue**: Internal workflow failure

Please check the workflow logs for detailed error information and contact support if needed."
            REVIEW_STATUS="error"
            CRITICAL_ISSUES_COUNT="0"
          fi
          
          {
            echo 'summary_content<<SUMMARY_EOF_MARKER'
            echo "$SUMMARY_CONTENT"
            echo 'SUMMARY_EOF_MARKER'
          } >> $GITHUB_OUTPUT
          
          echo "review_status=$REVIEW_STATUS" >> $GITHUB_OUTPUT
          echo "critical_issues_count=$CRITICAL_ISSUES_COUNT" >> $GITHUB_OUTPUT
          
          echo "📋 Final outputs determined:"
          echo "  Status: $REVIEW_STATUS"
          echo "  Critical Issues: $CRITICAL_ISSUES_COUNT"