# CAMARA Project - Spectral linting ruleset for Commonalities r4.x (Spring26+)
# r4.1 baseline (Commonalities 0.7.0-rc.1), evolves with pre-releases per DEC-025.
# Stabilizes at Commonalities 0.7.0 public release.
#
# Based on: https://github.com/camaraproject/Commonalities/blob/main/artifacts/linting_rules/.spectral.yml
# Changelog:
# - 31.01.2024: Initial version
# - 19.03.2024: Corrected camara-http-methods rule
# - 03.12.2024: Corrected camara-path-param-id and camara-discriminator-use to handle null values error in example fields
# - 09.01.2025: Updated info-contact rule
# - 21.07.2025: Added camara-schema-type-check rule
# - 12.01.2026: camara-discriminator-use deprecated
# - 03.04.2026: Added OWASP API Security Top 10 2023 rules (Linting-rules.md section 5)
# - 07.04.2026: Added Phase 2a gap rules (S-018..S-035): license, contact, tags,
#   apiRoot, 403, error codes, subscription, format descriptions, required props,
#   array items description, notification content-type


# Note: @stoplight/spectral-owasp-ruleset is installed via validation/package.json.
# Spectral resolves this package via NODE_PATH (set in shared-actions/run-validation/action.yml)
# because the ruleset file lives in linting/config/ while node_modules is in validation/.
extends:
  - "spectral:oas"
  - "@stoplight/spectral-owasp-ruleset"
functions:
  - camara-reserved-words
  - camara-language-avoid-telco
  - camara-security-no-secrets-in-path-or-query-parameters
  - camara-schema-casing-convention
  - camara-schema-type-check
  - camara-format-description-check
  - camara-error-code-dot-format
  - camara-required-properties-exist
  - camara-array-items-description
  - camara-notification-content-type
functionsDir: "./lint_function"
rules:
  #  Built-in OpenAPI Specification ruleset. Each rule then can be enabled individually.
  #  The severity keyword is optional in rule definition and can be error, warn, info, hint, or off. The default value is warn.
  contact-properties: false
  duplicated-entry-in-enum: true
  info-contact: false
  info-description: true
  info-license: true
  license-url: true
  no-$ref-siblings: error
  no-eval-in-markdown: true
  no-script-tags-in-markdown: true
  openapi-tags: false
  openapi-tags-alphabetical: false
  openapi-tags-uniqueness: error
  operation-description: true
  operation-operationId: true
  operation-operationId-unique: error
  operation-operationId-valid-in-url: true
  operation-parameters: true
  operation-singular-tag: true
  operation-success-response: true
  operation-tags: true
  operation-tag-defined: true
  path-declarations-must-exist: true
  path-keys-no-trailing-slash: true
  path-not-include-query: true
  path-params: error
  tag-description: false
  typed-enum: true
  oas3-api-servers: true
  oas3-examples-value-or-externalValue: true
  oas3-operation-security-defined: false
  oas3-parameter-description: false
  oas3-schema: true
  oas3-server-not-example.com: false
  oas3-server-trailing-slash: true
  oas3-unused-component: true
  oas3-valid-media-example: true
  oas3-valid-schema-example: true
  # oas3-server-variables: true

  # Custom Rules Utilizing Spectral's Built-in Functions and JavaScript Implementations

  camara-language-avoid-telco:
    message: "{{error}}"
    severity: hint
    description: |
      This rule checks for telco-specific terminology in your API definitions and suggests more inclusive terms.
    given: "$..*.*"
    then:
      function: camara-language-avoid-telco
    recommended: false  # Set to true/false to enable/disable this rule

  camara-oas-version:
    message: "OpenAPI Version Error: The OpenAPI specification must adhere to version 3.0.3."
    severity: error
    description: |
      This rule validates the OpenAPI version in your specification and requires compliance with version 3.0.3.
    given: "$"
    then:
      field: openapi
      function: pattern
      functionOptions:
        match: 3.0.3
    recommended: true  # Set to true/false to enable/disable this rule

  camara-path-param-id:
    message: "Path Parameter Naming Warning: Use 'resource_id' instead of just 'id' in path parameters."
    severity: warn
    description: |
      This rule ensures consistent and descriptive naming for path parameters in your OpenAPI specification.
      Please use 'resource_id' instead of just 'id' for your path parameters.
    given: "$.paths[*][*].parameters[?(@.in == 'path')].name"
    then:
      field: name
      function: pattern
      functionOptions:
        match: "^(?!.*\\b(id|Id|ID|iD)\\b).*$"
    recommended: true  # Set to true/false to enable/disable this rule

  camara-security-no-secrets-in-path-or-query-parameters:
    message: "{{error}}"
    severity: warn
    description: |
      Flags 'MSISDN', 'IMSI', and 'phoneNumber' appearing as standalone
      tokens in path strings or in path/query parameter names.
    given:
      - "$.paths"
      - "$..parameters[?(@.in != 'header')]"
    then:
      function: camara-security-no-secrets-in-path-or-query-parameters
    recommended: true  # Set to true/false to enable/disable this rule

  camara-http-methods:
    description: "Ensure that all path URLs have valid HTTP methods (GET, PUT, POST, DELETE, PATCH, OPTIONS)."
    message: "Invalid HTTP method for '{{path}}'. Must be one of get, put, post, delete, patch, options."
    severity: error
    given: $.paths[*][*]~
    then:
      function: pattern
      functionOptions:
        match: "^(get|put|post|delete|patch|options|parameters)$"
    recommended: true  # Set to true/false to enable/disable this rule

  camara-get-no-request-body:
    message: There must be no request body for Get and DELETE
    severity: error
    given:
      - "$.paths.*.get"
      - "$.paths.*.delete"
    then:
      field: requestBody
      function: falsy
    recommended: true  # Set to true/false to enable/disable this rule

  camara-reserved-words:
    message: "{{error}}"
    severity: warn
    description: |
      Reserved words (Java/etc. language keywords used by code-generation
      tooling) must not appear as standalone tokens in path segments,
      parameter names, schema/property/component names, security scheme
      names, or operationId values.
    given:
      - "$.paths"                              # Paths
      - "$..parameters[*]"                     # Path or Query Parameter Names
      - "$..components.schemas.*.properties.*" # Request and Response body parameter names
      - "$.components.securitySchemes"         # Security Schemes
      - "$.components.*.*"                     # Component Names
      - "$.paths.*.*.operationId"              # OperationIds
    then:
      function: camara-reserved-words
    recommended: true  # Set to true/false to enable/disable this rule

  camara-routes-description:
    message: "Functionality method description Warning: Each method should have description."
    severity: warn
    description: |
            This rule checks if each operation (POST, GET, DELETE, PUT, PATCH, OPTIONS) in your API specification has a description.
            Ensure that you have added a 'summary' field for each operation in your OpenAPI specification.
    given:
      - "$.paths.*.post"
      - "$.paths.*.get"
      - "$.paths.*.delete"
      - "$.paths.*.put"
      - "$.paths.*.patch"
      - "$.paths.*.options"
    then:
      field: description
      function: truthy
    recommended: true  # Set to true/false to enable/disable this rule

  camara-parameters-descriptions:
    message: "Parameter description is missing or empty: {{error}}"
    severity: warn
    description: |
      This Spectral rule ensures that each path parameter in the API specification has a descriptive and meaningful description.
    given:
      - "$.paths..parameters.*"
    then:
      field: description
      function: truthy
    recommended: true  # Set to true/false to enable/disable this rule

  camara-response-descriptions:
    message: "Parameter description is missing or empty: {{error}}"
    severity: warn
    description: |
      This Spectral rule ensures that each responese object in the API specification has a descriptive and meaningful description.
    given:
      - "$.paths..responses.*"
    then:
      field: description
      function: truthy
    recommended: true  # Set to true/false to enable/disable this rule

  camara-properties-descriptions:
    message: "Property description is missing or empty: {{error}}"
    severity: warn
    description: |
      This Spectral rule ensures that each propoerty within objects in the API specification has a descriptive and meaningful description.
    given:
      - "$.components.*.*"
      - "$.components.*.*.properties.*"
    then:
      field: description
      function: truthy
    recommended: true  # Set to true/false to enable/disable this rule

  camara-operation-summary:
    message: "Operation Summary Warning: Each operation should include a short summary for better understanding."
    severity: warn
    description: |
            This rule checks if each operation (POST, GET, DELETE, PUT, PATCH, OPTIONS) in your API specification has a meaningful summary.
            Ensure that you have added a 'summary' field for each operation in your OpenAPI specification.
    given:
      - "$.paths.*.post"
      - "$.paths.*.get"
      - "$.paths.*.delete"
      - "$.paths.*.put"
      - "$.paths.*.patch"
      - "$.paths.*.options"
    then:
      field: summary
      function: truthy
    recommended: true  # Set to true/false to enable/disable this rule

  camara-discriminator-use:
    description: |
      Ensure that API definition YAML files with oneOf or anyOf sections include a discriminator object for serialization, deserialization, and validation.
    severity: hint
    given: "$.components.schemas[*]"
    then:
      - field: oneOf
        function: truthy
        message: "Schemas with 'oneOf' should include a 'discriminator' for type identification."
      - field: anyOf
        function: truthy
        message: "Schemas with 'anyOf' should include a 'discriminator' for type identification."
      - field: discriminator
        function: truthy
        message: "A 'discriminator' object is required when using 'oneOf' or 'anyOf'."
    recommended: false # Deprecated in r4.x (12.01.2026)

  camara-operationid-casing-convention:
    message: Operation Id must be in Camel case "{{error}}"
    severity: hint
    description: |
        This rule checks Operation ids should follow a specific case convention: camel case.
    given: "$.paths.*.*.operationId"
    then:
      function: casing
      functionOptions:
        type: camel
    recommended: true  # Set to true/false to enable/disable this rule

  camara-schema-casing-convention:
    description: >
      Schema names must be PascalCase (UpperCamelCase). CloudEvents schema names
      (HTTPSettings, HTTPSubscriptionRequest, HTTPSubscriptionResponse,
      PrivateKeyJWTCredential) are allowed as explicit exceptions.
    message: "{{error}}"
    severity: warn
    given: $.components.schemas[*]~
    then:
      function: camara-schema-casing-convention
    recommended: true  # Set to true/false to enable/disable this rule

  camara-parameter-casing-convention:
    description: Paths should be kebab-case.
    severity: error
    message: "{{property}} is not kebab-case: {{error}}"
    given: $.paths[*]~
    then:
      function: pattern
      functionOptions:
        match: "^\/([a-z0-9]+(-[a-z0-9]+)*)?(\/[a-z0-9]+(-[a-z0-9]+)*|\/{.+})*$"  # doesn't allow /asasd{asdas}sadas pattern or not closed braces
    recommended: true  # Set to true/false to enable/disable this rule

  camara-schema-type-check:
    description: >
      Every schema node must declare a valid type (string, number, integer,
      boolean, array, object) or use a combiner (allOf, anyOf, oneOf).
      Recursively checks properties, items, and additionalProperties.
    message: "{{error}}"
    severity: error
    given: "$.components.schemas.*"
    then:
      function: camara-schema-type-check
    recommended: true

  # ===== Phase 2a Gap Rules (Design Guide + Subscription Guide) =====

  # --- Group A: Simple field checks ---

  camara-license-name:
    description: "info.license.name MUST be 'Apache 2.0'."
    message: "License name must be exactly 'Apache 2.0', got '{{value}}'."
    severity: error
    given: $.info.license.name
    then:
      function: pattern
      functionOptions:
        match: "^Apache 2\\.0$"
    recommended: true

  camara-license-url-value:
    description: "info.license.url MUST be the Apache 2.0 license URL."
    message: "License URL must be 'https://www.apache.org/licenses/LICENSE-2.0.html', got '{{value}}'."
    severity: error
    given: $.info.license.url
    then:
      function: pattern
      functionOptions:
        match: "^https://www\\.apache\\.org/licenses/LICENSE-2\\.0\\.html$"
    recommended: true

  camara-no-contact:
    description: "info.contact MUST NOT be present in CAMARA API specifications."
    message: "info.contact must not be present. CAMARA APIs do not use individual contact information."
    severity: warn
    given: $.info
    then:
      field: contact
      function: falsy
    recommended: true

  camara-tag-name-title-case:
    description: "Tag names SHOULD follow Title Case convention (each word capitalized, separated by spaces)."
    message: "Tag name '{{value}}' is not Title Case. Use e.g. 'Quality On Demand' instead of 'quality-on-demand'."
    severity: hint
    given: $.tags[*].name
    then:
      function: pattern
      functionOptions:
        match: "^[A-Z][a-zA-Z0-9]*(\\s[A-Z][a-zA-Z0-9]*)*$"
    recommended: true

  camara-api-root-default:
    description: "apiRoot variable default SHOULD be 'http://localhost:9091'."
    message: "apiRoot default should be 'http://localhost:9091', got '{{value}}'."
    severity: hint
    given: $.servers[*].variables.apiRoot.default
    then:
      function: pattern
      functionOptions:
        match: "^http://localhost:9091$"
    recommended: true

  camara-api-root-description:
    description: "apiRoot variable description SHOULD match the standard CAMARA text."
    message: "apiRoot description does not match the standard CAMARA text."
    severity: hint
    given: $.servers[*].variables.apiRoot.description
    then:
      function: pattern
      functionOptions:
        match: "^API root, defined by the service provider, e\\.g\\. `api\\.example\\.com` or `api\\.example\\.com/somepath`$"
    recommended: true

  camara-response-403:
    description: "All API operations MUST document a 403 Forbidden response."
    message: "Operation is missing a 403 response definition."
    severity: warn
    given: "$.paths[*][get,put,post,delete,patch].responses"
    then:
      field: "403"
      function: truthy
    recommended: true

  # --- Group B: Error code checks ---

  camara-error-code-not-numeric:
    description: "Error code enum values MUST NOT be purely numeric."
    message: "Error code '{{value}}' must not be numeric. Use descriptive string codes like INVALID_ARGUMENT."
    severity: error
    given:
      - "$.paths.*.*.responses.*.content.*.schema.allOf[*].properties.code.enum[*]"
      - "$.components.responses.*.content.*.schema.allOf[*].properties.code.enum[*]"
    then:
      function: pattern
      functionOptions:
        notMatch: "^\\d+$"
    recommended: true

  camara-error-code-screaming-snake-case:
    description: "Error code enum values MUST be SCREAMING_SNAKE_CASE, optionally with API_NAME prefix separated by dot."
    message: "Error code '{{value}}' is not SCREAMING_SNAKE_CASE (optionally API_NAME.CODE)."
    severity: warn
    given:
      - "$.paths.*.*.responses.*.content.*.schema.allOf[*].properties.code.enum[*]"
      - "$.components.responses.*.content.*.schema.allOf[*].properties.code.enum[*]"
    then:
      function: pattern
      functionOptions:
        match: "^[A-Z][A-Z0-9]*(_[A-Z0-9]+)*(\\.[A-Z][A-Z0-9]*(_[A-Z0-9]+)*)?$"
    recommended: true

  camara-error-code-api-specific-format:
    description: "API-specific error codes with dots MUST follow API_NAME.SPECIFIC_CODE format."
    message: "{{error}}"
    severity: warn
    given:
      - "$.paths.*.*.responses.*.content.*.schema.allOf[*].properties.code.enum[*]"
      - "$.components.responses.*.content.*.schema.allOf[*].properties.code.enum[*]"
    then:
      function: camara-error-code-dot-format
    recommended: true

  # --- Group C: Subscription schema checks ---

  camara-cloudevent-specversion:
    description: "CloudEvent specversion MUST be constrained to enum ['1.0']."
    message: "specversion must be '1.0', got '{{value}}'."
    severity: hint
    given: "$.components.schemas.*.properties.specversion.enum[0]"
    then:
      function: pattern
      functionOptions:
        match: "^1\\.0$"
    recommended: true

  camara-subscription-protocol-http:
    description: "Protocol enum MUST contain only 'HTTP' (only HTTP is allowed for now)."
    message: "Protocol enum should contain only 'HTTP'. Found '{{value}}'."
    severity: hint
    given: "$.components.schemas.Protocol.enum[*]"
    then:
      function: pattern
      functionOptions:
        match: "^HTTP$"
    recommended: true

  camara-subscription-sink-https:
    description: "The 'sink' property MUST have a pattern enforcing HTTPS."
    message: "sink property must have a pattern enforcing HTTPS (e.g. '^https:\\/\\/.+$')."
    severity: warn
    given: "$.components.schemas.*.properties.sink.pattern"
    then:
      function: pattern
      functionOptions:
        match: "https"
    recommended: true

  camara-notification-content-type:
    description: "Notification callback request body MUST use 'application/cloudevents+json' content type."
    message: "{{error}}"
    severity: warn
    given: "$.paths.*.*.callbacks.*.*.post.requestBody.content"
    then:
      function: camara-notification-content-type
    recommended: true

  # --- Group D: Custom JS function rules ---

  camara-datetime-rfc3339-description:
    description: "Properties with format 'date-time' MUST have a description mentioning RFC 3339."
    message: "{{error}}"
    severity: hint
    given: "$.components.schemas.*"
    then:
      function: camara-format-description-check
      functionOptions:
        format: "date-time"
        requiredText: "RFC\\s*3339"
    recommended: true

  camara-duration-rfc3339-description:
    description: "Properties with format 'duration' MUST have a description mentioning RFC 3339."
    message: "{{error}}"
    severity: hint
    given: "$.components.schemas.*"
    then:
      function: camara-format-description-check
      functionOptions:
        format: "duration"
        requiredText: "RFC\\s*3339"
    recommended: true

  camara-required-properties-exist:
    description: "Every property listed in 'required' MUST be defined in 'properties'."
    message: "{{error}}"
    severity: warn
    given: "$.components.schemas.*"
    then:
      function: camara-required-properties-exist
    recommended: true

  camara-array-items-description:
    description: "Array 'items' MUST have a description when defined inline (not $ref)."
    message: "{{error}}"
    severity: warn
    given: "$.components.schemas.*"
    then:
      function: camara-array-items-description
    recommended: true

  # ===== OWASP API Security Top 10 2023 =====
  # Source: Commonalities Linting-rules.md section 5
  # Severity overrides per CAMARA agreement (Commonalities #539, #548, #551, #552)
  # Target severity escalation for API4 resource consumption rules: warn → error in 2027

  # --- API1: Broken Object Level Authorization ---
  owasp:api1:2023-no-numeric-ids: error

  # --- API2: Broken Authentication ---
  owasp:api2:2023-auth-insecure-schemes: off      # OpenID used exclusively
  owasp:api2:2023-jwt-best-practices: off          # OpenID handles JWT
  owasp:api2:2023-no-api-keys-in-url: off          # No API keys — OpenID used
  owasp:api2:2023-no-credentials-in-url: error
  owasp:api2:2023-no-http-basic: off               # No HTTP basic — OpenID used
  owasp:api2:2023-short-lived-access-tokens: error
  owasp:api2:2023-write-restricted: error
  owasp:api2:2023-read-restricted: warn

  # --- API3: Broken Object Property Level Authorization ---
  owasp:api3:2023-constrained-additionalProperties: warn   # OAS 3.0 only
  owasp:api3:2023-constrained-unevaluatedProperties: warn  # OAS 3.1 only (no-op for 3.0.3)
  owasp:api3:2023-no-additionalProperties: warn            # OAS 3.0 only
  owasp:api3:2023-no-unevaluatedProperties: warn           # OAS 3.1 only (no-op for 3.0.3)

  # --- API4: Unrestricted Resource Consumption ---
  owasp:api4:2023-array-limit: warn                 # → error in 2027
  owasp:api4:2023-integer-format: warn              # → error in 2027
  owasp:api4:2023-integer-limit: off                # OAS 3.1 only; legacy covers 3.0
  owasp:api4:2023-integer-limit-legacy: warn        # → error in 2027
  owasp:api4:2023-rate-limit: off                   # Gateway-level
  owasp:api4:2023-rate-limit-retry-after: off       # Gateway-level
  owasp:api4:2023-rate-limit-responses-429: off     # Gateway-level
  owasp:api4:2023-string-limit: warn                # → error in 2027
  owasp:api4:2023-string-restricted: warn

  # --- API5: Broken Function Level Authorization ---
  owasp:api5:2023-admin-security-unique: error

  # --- API7: Server Side Request Forgery ---
  owasp:api7:2023-concerning-url-parameter: info

  # --- API8: Security Misconfiguration ---
  owasp:api8:2023-define-cors-origin: off           # Gateway/implementation-level
  owasp:api8:2023-define-error-responses-401: error  # Elevated from upstream warn
  owasp:api8:2023-define-error-responses-500: off    # Not recommended in CAMARA
  owasp:api8:2023-define-error-validation: warn
  owasp:api8:2023-no-scheme-http: error              # OAS 2 only (no-op for 3.0.3)
  owasp:api8:2023-no-server-http: error

  # --- API9: Improper Inventory Management ---
  owasp:api9:2023-inventory-access: off             # x-internal not used
  owasp:api9:2023-inventory-environment: off        # Environment terms not used
